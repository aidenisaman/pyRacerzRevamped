name: Build pyRacerzRevamped

on:
  push:
    branches: [ main, installer ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ['3.11']
        include:
          - os: ubuntu-latest
            artifact_name: pyRacerz-Linux-x86_64
          - os: macos-latest
            artifact_name: pyRacerz-macOS-x86_64
          - os: windows-latest
            artifact_name: pyRacerz-Windows-x86_64
      fail-fast: false

    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v4

    - name: Build executable with PyInstaller
      uses: sayyid5416/pyinstaller@v1
      with:
        spec: 'pyRacerz.spec'
        requirements: 'requirements.txt'
        python_ver: '3.11'
        pyinstaller_ver: ''
        exe_path: './dist'
        upload_exe_with_name: ${{ matrix.artifact_name }}
        compression_level: 6

    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v2
      with:
        files: |
          ./dist/${{ matrix.artifact_name }}.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
