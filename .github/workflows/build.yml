name: Build pyRacerzRevamped

on:
  push:
    branches: [ main, installer ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ['3.11']
      fail-fast: false

    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller pygame numpy

    - name: Build with PyInstaller (Windows)
      if: runner.os == 'Windows'
      run: |
        pyinstaller --noconfirm ./pyRacerz.spec
        # Create zip for distribution
        cd dist
        powershell -Command "Compress-Archive -Path 'pyRacerz\*' -DestinationPath 'pyRacerz-Windows-x86_64.zip'"

    - name: Build with PyInstaller (macOS)
      if: runner.os == 'macOS'
      run: |
        pyinstaller --noconfirm ./pyRacerz.spec
        # Create zip for distribution
        cd dist
        zip -r pyRacerz-macOS-x86_64.zip pyRacerz/
        # Also create DMG-ready structure (optional, for future releases)
        mkdir -p pyRacerz.app/Contents/MacOS pyRacerz.app/Contents/Resources
        mv pyRacerz/* pyRacerz.app/Contents/MacOS/ 2>/dev/null || true

    - name: Build with PyInstaller (Linux)
      if: runner.os == 'Linux'
      run: |
        pyinstaller --noconfirm ./pyRacerz.spec
        # Create tar.gz for distribution
        cd dist
        tar -czf pyRacerz-Linux-x86_64.tar.gz pyRacerz/

    - name: Upload Windows artifact
      if: runner.os == 'Windows'
      uses: actions/upload-artifact@v3
      with:
        name: pyRacerz-Windows
        path: dist/pyRacerz-Windows-x86_64.zip
        retention-days: 30

    - name: Upload macOS artifact
      if: runner.os == 'macOS'
      uses: actions/upload-artifact@v3
      with:
        name: pyRacerz-macOS
        path: dist/pyRacerz-macOS-x86_64.zip
        retention-days: 30

    - name: Upload Linux artifact
      if: runner.os == 'Linux'
      uses: actions/upload-artifact@v3
      with:
        name: pyRacerz-Linux
        path: dist/pyRacerz-Linux-x86_64.tar.gz
        retention-days: 30

    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v1
      with:
        files: |
          dist/pyRacerz-Windows-x86_64.zip
          dist/pyRacerz-macOS-x86_64.zip
          dist/pyRacerz-Linux-x86_64.tar.gz
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
